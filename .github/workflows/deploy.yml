name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_APPS_SCRIPT_URL: ${{ secrets.VITE_APPS_SCRIPT_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_DOCENT_HASH: ${{ secrets.VITE_DOCENT_HASH }}
          VITE_EIGENAAR_HASH: ${{ secrets.VITE_EIGENAAR_HASH }}
          VITE_EDITOR_HASH: ${{ secrets.VITE_EDITOR_HASH }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
